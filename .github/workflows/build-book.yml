name: Build Jupyter Book

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/xu-cheng/texlive-full:latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: /root/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements-build.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        # --break-system-packages is safe here: the container is ephemeral and isolated
        run: |
          apk add --no-cache py3-pip nodejs npm
          pip3 install --break-system-packages -r requirements-build.txt

      - name: Build PDF book
        run: jupyter-book build --pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: jupyter-book-pdf
          path: exports/book.pdf
          if-no-files-found: warn
